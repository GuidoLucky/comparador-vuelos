<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Tour — Iniciar Sesión</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');
  
  * { margin:0; padding:0; box-sizing:border-box; }
  
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  
  /* Subtle grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0;
  }
  
  /* Glow accents */
  .glow-1, .glow-2 {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    z-index: 0;
    pointer-events: none;
  }
  .glow-1 { width: 400px; height: 400px; background: rgba(212,175,55,0.08); top: -100px; right: -100px; }
  .glow-2 { width: 300px; height: 300px; background: rgba(30,144,255,0.06); bottom: -80px; left: -80px; }
  
  .login-container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    padding: 20px;
  }
  
  .login-card {
    background: rgba(22,27,34,0.95);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 40px 32px;
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  
  .logo-area {
    text-align: center;
    margin-bottom: 32px;
  }
  
  .logo-icon {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, #d4af37, #f0d060);
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    box-shadow: 0 4px 20px rgba(212,175,55,0.3);
  }
  
  .logo-icon svg {
    width: 28px;
    height: 28px;
    fill: #0d1117;
  }
  
  .logo-area h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #fff;
  }
  
  .logo-area h1 span { color: #d4af37; }
  
  .logo-area p {
    font-size: 13px;
    color: #8b949e;
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  
  .form-group {
    margin-bottom: 18px;
  }
  
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: #8b949e;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  
  .form-group input {
    width: 100%;
    padding: 12px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: #e6edf3;
    font-size: 15px;
    font-family: inherit;
    transition: all 0.2s;
    outline: none;
  }
  
  .form-group input:focus {
    border-color: #d4af37;
    background: rgba(212,175,55,0.04);
    box-shadow: 0 0 0 3px rgba(212,175,55,0.1);
  }
  
  .form-group input::placeholder {
    color: rgba(255,255,255,0.2);
  }
  
  .btn-login {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #d4af37, #c5a028);
    border: none;
    border-radius: 10px;
    color: #0d1117;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    letter-spacing: 0.02em;
  }
  
  .btn-login:hover {
    background: linear-gradient(135deg, #e0bf4a, #d4af37);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(212,175,55,0.35);
  }
  
  .btn-login:active { transform: translateY(0); }
  
  .btn-login:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }
  
  .error-msg {
    background: rgba(248,81,73,0.1);
    border: 1px solid rgba(248,81,73,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #f85149;
    margin-bottom: 18px;
    display: none;
    text-align: center;
  }
  
  .error-msg.show { display: block; }
  
  .footer-text {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: #484f58;
  }
  
  /* Loading spinner */
  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid transparent;
    border-top: 2px solid #0d1117;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="glow-1"></div>
<div class="glow-2"></div>

<div class="login-container">
  <div class="login-card">
    <div class="logo-area">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0011.5 2 1.5 1.5 0 0010 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>
      </div>
      <h1><span>Lucky</span> Tour</h1>
      <p>Comparador de Vuelos</p>
    </div>
    
    <div id="errorMsg" class="error-msg"></div>
    
    <div>
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" id="usuario" placeholder="Tu usuario" autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-login" id="btnLogin" onclick="doLogin()">Iniciar sesión</button>
    </div>
    
    <div class="footer-text">Lucky Tour — Empresa de Viajes y Turismo</div>
  </div>
</div>

<script>
  const userInput = document.getElementById('usuario');
  const passInput = document.getElementById('password');
  const btnLogin = document.getElementById('btnLogin');
  const errorMsg = document.getElementById('errorMsg');
  
  // Enter key submits
  [userInput, passInput].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  });
  
  async function doLogin() {
    const usuario = userInput.value.trim();
    const password = passInput.value;
    if (!usuario || !password) {
      showError('Ingresá usuario y contraseña');
      return;
    }
    
    btnLogin.disabled = true;
    btnLogin.innerHTML = '<span class="spinner"></span>Ingresando...';
    errorMsg.classList.remove('show');
    
    try {
      const resp = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ usuario, password })
      });
      const data = await resp.json();
      if (data.ok) {
        window.location.href = '/';
      } else {
        showError(data.error || 'Error al iniciar sesión');
      }
    } catch(e) {
      showError('Error de conexión');
    }
    
    btnLogin.disabled = false;
    btnLogin.textContent = 'Iniciar sesión';
  }
  
  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('show');
  }
</script>
</body>
</html>
